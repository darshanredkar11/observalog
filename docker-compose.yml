services:

  # ─── Storage ────────────────────────────────────────────────────────────────

  timescaledb:
    image: timescale/timescaledb-ha:pg16-latest
    environment:
      POSTGRES_USER: observalog
      POSTGRES_PASSWORD: observalog
      POSTGRES_DB: observalog
    volumes:
      - timescaledb_data:/home/postgres/pgdata/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observalog -d observalog"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ─── Cache / gap-detection buffer ───────────────────────────────────────────

  valkey:
    image: valkey/valkey:7.2
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Kafka (KRaft — no Zookeeper) ───────────────────────────────────────────

  kafka:
    image: bitnami/kafka:3.7
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_CFG_LOG_RETENTION_HOURS=24
    volumes:
      - kafka_data:/bitnami/kafka
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 15

  # One-shot: create the log topic then exit.
  kafka-init:
    image: bitnami/kafka:3.7
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      kafka-topics.sh
        --bootstrap-server kafka:9092
        --create
        --if-not-exists
        --topic observalog-logs
        --partitions 6
        --replication-factor 1
    restart: "no"

  # ─── Log collector ───────────────────────────────────────────────────────────

  fluent-bit:
    image: fluent/fluent-bit:3.2
    volumes:
      - ./docker/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./docker/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      # Mount Docker's own log directory so Fluent Bit can tail container stdout.
      # Requires the Docker socket to be accessible on the host.
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - fluent_bit_db:/var/log
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "2020:2020"   # Fluent Bit metrics / health
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2020/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── AI triage engine ────────────────────────────────────────────────────────

  brain:
    build:
      context: ./observalog-brain
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://observalog:observalog@timescaledb:5432/observalog
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: observalog-logs
      REDIS_URL: redis://valkey:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LISTEN_ADDR: 0.0.0.0:4000
      RUST_LOG: info
    ports:
      - "4000:4000"   # WebSocket API  ws://localhost:4000/ws
    depends_on:
      timescaledb:
        condition: service_healthy
      valkey:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  timescaledb_data:
  kafka_data:
  fluent_bit_db:
