[SERVICE]
    flush        1
    daemon       off
    log_level    info
    parsers_file /fluent-bit/etc/parsers.conf
    http_server  on
    http_listen  0.0.0.0
    http_port    2020

# Tail every container's stdout from the Docker log directory.
# The docker parser extracts the `log` field from Docker's JSON envelope.
[INPUT]
    name              tail
    path              /var/lib/docker/containers/*/*.log
    parser            docker
    tag               docker.*
    db                /var/log/fluentbit.db
    mem_buf_limit     50MB
    skip_long_lines   on
    refresh_interval  5

# Keep only Part A lines (A:<version>|...) and Part B lines (raw JSON objects).
# The brain's Kafka consumer handles any stray lines gracefully, but filtering
# here keeps Kafka clean and reduces ingest volume.
[FILTER]
    name   grep
    match  docker.*
    regex  log ^(A:|\{)

# Forward to Kafka with GZIP compression.
# The brain commits offsets only after a successful DB write, so no log is
# lost if the brain restarts mid-batch.
[OUTPUT]
    name                        kafka
    match                       docker.*
    brokers                     kafka:9092
    topics                      observalog-logs
    compression                 gzip
    rdkafka.request.required.acks -1
    rdkafka.message.timeout.ms  30000
