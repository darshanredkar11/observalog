name: Publish observalog-node

on:
  push:
    tags:
      - 'node/v*'   # e.g. node/v1.0.0

jobs:
  publish:
    name: Publish to GitHub Packages (npm)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@darshanredkar11'
          cache: 'npm'
          cache-dependency-path: observalog-node/package-lock.json

      - name: Install dependencies
        working-directory: observalog-node
        run: npm ci

      - name: Run tests
        working-directory: observalog-node
        run: npm test

      - name: Build
        working-directory: observalog-node
        run: npm run build

      - name: Publish to GitHub Packages
        working-directory: observalog-node
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
