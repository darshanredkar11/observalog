name: Publish observalog-node

on:
  push:
    tags:
      - 'node/v*'   # e.g. node/v1.0.0

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'
          cache: 'npm'
          cache-dependency-path: observalog-node/package-lock.json

      - name: Install dependencies
        working-directory: observalog-node
        run: npm ci

      - name: Run tests
        working-directory: observalog-node
        run: npm test

      - name: Build
        working-directory: observalog-node
        run: npm run build

      - name: Publish
        working-directory: observalog-node
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
