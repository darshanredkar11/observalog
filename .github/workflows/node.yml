name: observalog-node

on:
  push:
    branches: [main]
    paths:
      - 'observalog-node/**'
  pull_request:
    paths:
      - 'observalog-node/**'

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: observalog-node/package-lock.json

      - name: Install dependencies
        working-directory: observalog-node
        run: npm ci

      - name: Type check
        working-directory: observalog-node
        run: npx tsc --noEmit

      - name: Test
        working-directory: observalog-node
        run: npm test
