name: Publish observalog-go

on:
  push:
    tags:
      - 'go/v*'   # e.g. go/v1.0.0 → publishes observalog-go@v1.0.0

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: observalog-go/go.sum

      - name: Run tests
        working-directory: observalog-go
        run: go test ./...

      # Go modules are fetched directly from GitHub via the Go proxy.
      # No upload step is needed — pushing the tag is sufficient.
      # This job creates a GitHub Release so the changelog is visible.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: observalog-go ${{ github.ref_name }}
          body: |
            Go library release. Consumers add with:
            ```
            go get github.com/darshanredkar11/observalog/observalog-go@${{ github.ref_name }}
            ```
