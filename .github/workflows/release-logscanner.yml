name: Release logscanner binaries

# Triggers on: git tag logscanner/v*
# Creates a GitHub Release with pre-built binaries for the four most common
# CI and developer platforms so teams don't need to compile Rust.
#
#   Tag and push:
#     git tag logscanner/v1.0.0 && git push origin logscanner/v1.0.0
#
#   Install in CI (no Rust required):
#     curl -sSL https://github.com/darshanredkar11/observalog/releases/download/logscanner%2Fv1.0.0/logscanner-linux-amd64 \
#       -o /usr/local/bin/logscanner && chmod +x /usr/local/bin/logscanner

on:
  push:
    tags:
      - 'logscanner/v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: logscanner-linux-amd64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: logscanner-linux-arm64

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: logscanner-darwin-amd64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: logscanner-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        working-directory: logscanner
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp logscanner/target/${{ matrix.target }}/release/logscanner ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#logscanner/}" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: logscanner ${{ env.VERSION }}
          body: |
            ## logscanner ${{ env.VERSION }}

            Static analyser for ObservaLog logging compliance.
            Supports Go, Java, TypeScript/JavaScript.

            ### Install (no Rust required)

            **Linux (amd64)**
            ```bash
            curl -sSL https://github.com/darshanredkar11/observalog/releases/download/${{ github.ref_name }}/logscanner-linux-amd64 \
              -o /usr/local/bin/logscanner && chmod +x /usr/local/bin/logscanner
            ```

            **macOS (Apple Silicon)**
            ```bash
            curl -sSL https://github.com/darshanredkar11/observalog/releases/download/${{ github.ref_name }}/logscanner-darwin-arm64 \
              -o /usr/local/bin/logscanner && chmod +x /usr/local/bin/logscanner
            ```

            **GitHub Actions CI step (recommended)**
            ```yaml
            - name: Install logscanner
              run: |
                curl -sSL https://github.com/darshanredkar11/observalog/releases/download/${{ github.ref_name }}/logscanner-linux-amd64 \
                  -o /usr/local/bin/logscanner && chmod +x /usr/local/bin/logscanner

            - name: Scan changed files
              run: |
                git diff --name-only origin/main...HEAD \
                  | grep -E '\.(go|java|ts|js)$' \
                  | logscanner --stdin --format text
            ```
          files: |
            artifacts/logscanner-linux-amd64/logscanner-linux-amd64
            artifacts/logscanner-linux-arm64/logscanner-linux-arm64
            artifacts/logscanner-darwin-amd64/logscanner-darwin-amd64
            artifacts/logscanner-darwin-arm64/logscanner-darwin-arm64
